<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 芭蕾娃娃英文聽寫 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #fdf2f8; /* pink-50 */
            background-image: radial-gradient(#fce7f3 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .btn-magic {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-magic:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background-color: #f472b6;
            box-shadow: 0 6px 0 #db2777;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-primary:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #db2777;
        }

        .doll-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        /* 芭蕾娃娃配件預設隱藏 */
        .acc { display: none; transition: opacity 0.5s ease-in-out; }
        .acc.active { display: block; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }

        .star-fly {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 50;
            animation: flyToTop 1s ease-in-out forwards;
        }

        @keyframes flyToTop {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.5) translateY(-200px); opacity: 0; }
        }

        /* 自訂捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fce7f3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center py-6 px-4">

    <!-- 提示框 Modal -->
    <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-95">
            <h3 id="alertTitle" class="text-2xl font-bold text-pink-600 mb-2">提示</h3>
            <p id="alertMessage" class="text-lg text-gray-600 mb-6"></p>
            <button onclick="closeAlert()" class="btn-primary text-white font-bold py-3 px-8 rounded-full text-xl w-full">知道囉！</button>
        </div>
    </div>

    <!-- 獲得配件 Modal -->
    <div id="unlockModal" class="fixed inset-0 bg-pink-900 bg-opacity-70 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl border-4 border-pink-400">
            <div class="text-6xl mb-4 floating">🎉</div>
            <h3 class="text-3xl font-bold text-pink-600 mb-2">哇！太棒了！</h3>
            <p class="text-xl text-gray-700 mb-4">收集滿 20 顆星星，解鎖了新配件：</p>
            <div id="unlockedItemName" class="text-2xl font-black text-purple-600 mb-6 bg-purple-100 py-3 rounded-full"></div>
            <button onclick="closeUnlockModal()" class="btn-primary text-white font-bold py-3 px-8 rounded-full text-xl w-full">太開心了！</button>
        </div>
    </div>

    <!-- View 1: 登入畫面 -->
    <div id="view-login" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 mt-10 border-4 border-pink-200">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-pink-500 mb-2">🌸 芭蕾娃娃 🌸</h1>
            <h2 class="text-2xl font-bold text-purple-500">英文聽寫練習</h2>
        </div>
        <div class="space-y-6 text-center">
            <div class="text-6xl floating mb-4">👧🩰</div>
            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">請輸入你的名字：</label>
                <input type="text" id="loginName" class="w-full text-center text-2xl p-4 border-4 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-500 transition" placeholder="例如：小美">
            </div>
            <button onclick="login()" class="btn-primary w-full text-white font-black text-2xl py-4 rounded-full mt-4">開始遊戲！</button>
        </div>
    </div>

    <!-- View 2: 主畫面 (Dashboard) -->
    <div id="view-dashboard" class="w-full max-w-4xl hidden flex-col md:flex-row gap-6">
        
        <!-- 左側面板：選單與設定 -->
        <div class="flex-1 bg-white rounded-3xl shadow-xl p-6 border-4 border-pink-200 flex flex-col">
            <div class="flex justify-between items-center border-b-4 border-pink-100 pb-4 mb-6">
                <h2 class="text-3xl font-black text-pink-600">哈囉，<span id="dashName"></span>！</h2>
                <button onclick="logout()" class="text-gray-400 hover:text-pink-500 font-bold transition">更換玩家</button>
            </div>

            <!-- 星星計分板 -->
            <div class="bg-yellow-50 rounded-2xl p-4 flex items-center justify-between mb-6 border-2 border-yellow-200 shadow-sm">
                <span class="text-xl font-bold text-yellow-700">我的星星 ⭐</span>
                <span id="dashStars" class="text-3xl font-black text-yellow-500">0</span>
            </div>

            <!-- 單字庫設定區 -->
            <div class="bg-blue-50 rounded-2xl p-5 mb-6 border-2 border-blue-200">
                <h3 class="text-xl font-bold text-blue-800 mb-3">📚 1. 系統單字庫</h3>
                <p class="text-gray-600 mb-3 text-lg">系統已為您內建 <span id="wordCount" class="font-black text-blue-600 text-2xl">0</span> 個必備英文單字！</p>
                <div class="w-full text-center bg-blue-200 text-blue-800 font-bold py-2 px-4 rounded-xl cursor-default">
                    隨時可以開始練習囉 ✨
                </div>
            </div>

            <!-- 練習範圍設定 -->
            <div class="bg-pink-50 rounded-2xl p-5 mb-6 border-2 border-pink-200 flex-grow">
                <h3 class="text-xl font-bold text-pink-800 mb-3">🎯 2. 開始練習</h3>
                <div class="flex items-center gap-3 mb-4">
                    <span class="font-bold text-gray-600">編號：</span>
                    <input type="number" id="startId" class="w-20 p-2 rounded-xl border-2 border-pink-200 text-center text-lg font-bold" value="1" min="1">
                    <span class="font-bold text-gray-600">到</span>
                    <input type="number" id="endId" class="w-20 p-2 rounded-xl border-2 border-pink-200 text-center text-lg font-bold" value="10" min="1">
                </div>
                <button onclick="preparePractice()" class="btn-primary w-full text-white font-black text-xl py-3 rounded-full">進入聽寫模式！</button>
            </div>
            
            <p class="text-center text-sm text-gray-400">💡 每答對1題可得1顆星，集滿20顆星解鎖配件喔！</p>
        </div>

        <!-- 右側面板：芭蕾娃娃展示區 -->
        <div class="flex-1 bg-white rounded-3xl shadow-xl p-6 border-4 border-purple-200 flex flex-col items-center">
            <h3 class="text-2xl font-black text-purple-600 mb-2">🎀 我的芭蕾娃娃</h3>
            <div class="text-sm font-bold text-purple-400 mb-4 bg-purple-50 py-1 px-4 rounded-full">
                收集進度：<span id="collectionCount">0</span>/20 件配件
            </div>
            
            <!-- SVG 娃娃容器 -->
            <div class="doll-container bg-gradient-to-b from-purple-50 to-pink-100 rounded-3xl overflow-hidden shadow-inner p-2 h-[450px]" id="svgDollContainer">
                <!-- SVG 會由 JS 動態注入 -->
            </div>
            
            <button onclick="showCollectionRoom()" class="mt-4 bg-purple-100 text-purple-700 font-bold py-2 px-6 rounded-full hover:bg-purple-200 transition">
                查看配件收藏櫃 🧳
            </button>
        </div>
    </div>

    <!-- 收藏櫃 Modal -->
    <div id="collectionModal" class="fixed inset-0 bg-white z-40 hidden flex-col">
        <div class="p-6 bg-purple-100 flex justify-between items-center shadow-md">
            <h2 class="text-3xl font-black text-purple-800">🧳 芭蕾配件收藏櫃</h2>
            <button onclick="closeCollectionRoom()" class="text-2xl font-bold bg-white text-purple-600 w-12 h-12 rounded-full shadow-md hover:bg-purple-50">X</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 md:p-12">
            <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-5xl mx-auto">
                <!-- 收藏品項目將由 JS 產生 -->
            </div>
        </div>
    </div>

    <!-- View 3: 聽寫練習畫面 -->
    <div id="view-practice" class="w-full max-w-5xl hidden flex-col md:flex-row gap-6">
        
        <!-- 左側：題目區 -->
        <div class="flex-1 bg-white rounded-3xl shadow-xl p-6 md:p-10 border-4 border-pink-300 flex flex-col relative">
            <button onclick="exitPractice()" class="absolute top-4 left-4 text-gray-400 hover:text-red-500 font-bold text-lg">✖ 退出練習</button>
            <div class="absolute top-4 right-4 bg-yellow-100 border-2 border-yellow-300 text-yellow-600 font-bold py-1 px-4 rounded-full text-lg">
                ⭐ <span id="practiceStars">0</span>
            </div>

            <div class="text-center mt-10 mb-2">
                <span id="practiceProgress" class="text-pink-400 font-bold text-lg bg-pink-50 py-1 px-4 rounded-full">第 1 / 10 題</span>
            </div>
            
            <div class="flex-1 flex flex-col items-center justify-center py-8">
                <!-- 中文提示 -->
                <h2 id="questionChinese" class="text-5xl md:text-6xl font-black text-gray-800 mb-8 text-center drop-shadow-sm">蘋果</h2>
                
                <!-- 播放聲音按鈕 -->
                <button onclick="playCurrentWord()" class="bg-blue-100 hover:bg-blue-200 text-blue-600 font-bold text-2xl py-3 px-8 rounded-full mb-8 flex items-center gap-2 transition shadow-sm border-2 border-blue-200">
                    🔊 聽發音
                </button>

                <!-- 輸入框 -->
                <input type="text" id="answerInput" class="w-full max-w-sm text-center text-4xl p-4 border-4 border-pink-300 rounded-3xl focus:outline-none focus:border-pink-500 transition mb-4 shadow-inner text-pink-700 font-bold lowercase tracking-wider" placeholder="輸入英文..." autocomplete="off">
                
                <!-- 提示文字區 -->
                <div id="hintMessage" class="h-8 text-lg font-bold text-red-500 mb-6 tracking-widest"></div>

                <!-- 按鈕區 -->
                <div class="flex gap-4 w-full max-w-sm">
                    <button onclick="checkAnswer()" class="btn-primary flex-1 text-white font-black text-2xl py-4 rounded-2xl">送出</button>
                    <button id="magicBtn" onclick="useMagic()" class="btn-magic flex-1 text-white font-black text-xl py-4 rounded-2xl flex flex-col items-center justify-center leading-tight">
                        <span>🪄</span>
                        <span class="text-sm">魔法提示</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右側：迷你娃娃區 -->
        <div class="hidden md:flex w-64 bg-pink-50 rounded-3xl shadow-lg border-4 border-pink-200 flex-col items-center p-4">
            <h4 class="font-bold text-pink-400 mb-2 text-center">加油！繼續收集星星⭐</h4>
            <div class="w-full flex-1 relative overflow-hidden rounded-2xl bg-white shadow-inner flex items-center justify-center">
                <div id="miniDollContainer" class="transform scale-75 origin-top mt-4">
                    <!-- 縮小的娃娃複製 -->
                </div>
            </div>
        </div>
    </div>

    <!-- View 4: 完成結算畫面 -->
    <div id="view-finish" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border-4 border-yellow-300 text-center hidden mt-10">
        <h1 class="text-5xl font-black text-yellow-500 mb-4 floating">🏆</h1>
        <h2 class="text-4xl font-black text-pink-600 mb-6">練習完成！</h2>
        
        <div class="bg-yellow-50 rounded-2xl p-6 mb-8 border-2 border-yellow-200">
            <p class="text-xl text-gray-600 font-bold mb-2">本次獲得星星</p>
            <div class="text-5xl font-black text-yellow-500 flex justify-center items-center gap-2">
                ⭐ +<span id="finishStars">0</span>
            </div>
        </div>

        <p class="text-lg text-gray-500 font-bold mb-8">芭蕾娃娃為你感到驕傲！</p>
        <button onclick="returnToDashboard()" class="btn-primary w-full text-white font-black text-2xl py-4 rounded-full">回到主畫面</button>
    </div>

let users = {};
let currentUser = null;

// 練習狀態
let practiceQueue = [];
let currentIndex = 0;
let currentMistakes = 0;
let usedMagic = false;
let sessionStars = 0;

// --- 初始化 ---
window.onload = () => {
    loadData();
    injectDollSVG();
    
    // 綁定 Enter 鍵送出
    document.getElementById('answerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkAnswer();
    });
    document.getElementById('loginName').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });

    showView('login');
};

// --- UI 切換邏輯 ---
function showView(viewId) {
    ['login', 'dashboard', 'practice', 'finish'].forEach(v => {
        document.getElementById(`view-${v}`).classList.add('hidden');
        document.getElementById(`view-${v}`).classList.remove('flex');
    });
    
    const view = document.getElementById(`view-${viewId}`);
    view.classList.remove('hidden');
    if (viewId === 'dashboard' || viewId === 'practice') {
        view.classList.add('flex'); // 回復 flex 佈局
    }
}

function showAlert(title, message) {
    document.getElementById('alertTitle').innerText = title;
    document.getElementById('alertMessage').innerText = message;
    document.getElementById('alertModal').classList.remove('hidden');
}

function closeAlert() {
    document.getElementById('alertModal').classList.add('hidden');
}

// --- 資料處理 ---
function parseCSVData(csvText) {
    const lines = csvText.split('\n');
    let parsedWords = [];
    
    for (let line of lines) {
        if (!line.trim()) continue;
        const parts = line.split(',');
        if (parts.length >= 3) {
            const idStr = parts[0].replace(/['"]/g, '').trim();
            let en = parts[1].replace(/['"]/g, '').trim();
            const zh = parts[2].replace(/['"]/g, '').trim();
            
            // 去除可能干擾發音或驗證的括號 (例如 shoe(s) 會自動被當作 shoe 處理)
            en = en.replace(/\(s\)/g, '').trim();

            const id = parseInt(idStr, 10);
            if (!isNaN(id) && en && zh) {
                parsedWords.push({ id, en, zh });
            }
        }
    }
    return parsedWords;
}

function loadData() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) users = JSON.parse(data);
    } catch (e) {
        console.error("無法讀取 LocalStorage", e);
    }
}

function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    } catch (e) {
        showAlert('錯誤', '儲存空間可能不足，無法儲存進度！');
    }
}

// --- 登入與主畫面邏輯 ---
function login() {
    const nameInput = document.getElementById('loginName').value.trim();
    if (!nameInput) {
        showAlert('Oops!', '請輸入你的名字才能開始喔！');
        return;
    }

    // 每次登入時自動載入內建的單字庫
    const builtInWords = parseCSVData(BUILT_IN_CSV);

    if (!users[nameInput]) {
        users[nameInput] = {
            name: nameInput,
            stars: 0,
            unlockedAccessories: [], // 儲存 accessory id
            words: builtInWords 
        };
        saveData();
    } else {
        // 自動為舊使用者更新內建單字庫
        users[nameInput].words = builtInWords;
        saveData();
    }
    
    currentUser = users[nameInput];
    updateDashboard();
    showView('dashboard');
}

function logout() {
    currentUser = null;
    document.getElementById('loginName').value = '';
    showView('login');
}

function updateDashboard() {
    if (!currentUser) return;
    document.getElementById('dashName').innerText = currentUser.name;
    document.getElementById('dashStars').innerText = currentUser.stars;
    document.getElementById('wordCount').innerText = currentUser.words.length;
    document.getElementById('collectionCount').innerText = currentUser.unlockedAccessories.length;
    
    // 自動依照單字總數調整題號預設值防呆
    if (currentUser.words.length > 0) {
        const maxWord = currentUser.words.length;
        document.getElementById('endId').max = maxWord;
        if (parseInt(document.getElementById('endId').value) > maxWord) {
            document.getElementById('endId').value = maxWord;
        }
    }

    updateDollAppearance();
}

// --- 練習模式 ---
function preparePractice() {
    if (currentUser.words.length === 0) {
        showAlert('等等！', '單字庫裡沒有單字，請檢查 BUILT_IN_CSV 喔！');
        return;
    }

    const sId = parseInt(document.getElementById('startId').value, 10);
    const eId = parseInt(document.getElementById('endId').value, 10);

    if (isNaN(sId) || isNaN(eId) || sId > eId) {
        showAlert('格式錯誤', '請輸入正確的編號範圍！');
        return;
    }

    practiceQueue = currentUser.words.filter(w => w.id >= sId && w.id <= eId);

    if (practiceQueue.length === 0) {
        showAlert('找不到單字', `範圍 ${sId} 到 ${eId} 中沒有找到單字！`);
        return;
    }

    // 準備進入練習
    sessionStars = 0;
    currentIndex = 0;
    document.getElementById('practiceStars').innerText = currentUser.stars;
    
    // 複製娃娃到迷你區
    const miniContainer = document.getElementById('miniDollContainer');
    miniContainer.innerHTML = document.getElementById('svgDollContainer').innerHTML;

    showView('practice');
    loadWord();
}

function loadWord() {
    if (currentIndex >= practiceQueue.length) {
        finishPractice();
        return;
    }

    const word = practiceQueue[currentIndex];
    currentMistakes = 0;
    usedMagic = false;
    
    document.getElementById('practiceProgress').innerText = `第 ${currentIndex + 1} / ${practiceQueue.length} 題`;
    document.getElementById('questionChinese').innerText = word.zh;
    document.getElementById('hintMessage').innerText = '';
    
    const input = document.getElementById('answerInput');
    input.value = '';
    input.focus();

    // 更新魔法按鈕狀態
    document.getElementById('magicBtn').classList.remove('opacity-50', 'cursor-not-allowed');
    document.getElementById('magicBtn').disabled = false;

    // 自動發音
    playCurrentWord();
}

function playCurrentWord() {
    const word = practiceQueue[currentIndex].en;
    if ('speechSynthesis' in window) {
        // 先取消前一個發音
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // 放慢一點適合小孩
        // 嘗試使用較好聽的女聲，若無則預設
        const voices = speechSynthesis.getVoices();
        const femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha')));
        if (femaleVoice) utterance.voice = femaleVoice;
        
        speechSynthesis.speak(utterance);
    }
}

function checkAnswer() {
    const inputField = document.getElementById('answerInput');
    const inputStr = inputField.value.trim().toLowerCase();
    const word = practiceQueue[currentIndex];
    const correctAns = word.en.trim().toLowerCase();

    if (inputStr === correctAns) {
        // 答對了
        handleCorrectAnswer();
    } else {
        // 答錯了
        currentMistakes++;
        inputField.value = ''; // 清空讓小孩重拼
        inputField.focus();
        
        let hintText = "";
        if (usedMagic) {
            hintText = `請照著拼寫：${word.en}`;
        } else {
            // 第一次錯顯示首字母，其餘底線
            const firstLetter = word.en.charAt(0);
            const blanks = " _".repeat(word.en.length - 1);
            hintText = currentMistakes === 1 
                ? `提示：${firstLetter}${blanks}` 
                : `再試一次喔！提示：${firstLetter}${blanks}`;
        }
        
        document.getElementById('hintMessage').innerText = hintText;
        document.getElementById('hintMessage').classList.remove('text-green-500');
        document.getElementById('hintMessage').classList.add('text-red-500');
    }
}

function handleCorrectAnswer() {
    document.getElementById('hintMessage').innerText = "太棒了！答對囉！✨";
    document.getElementById('hintMessage').classList.remove('text-red-500');
    document.getElementById('hintMessage').classList.add('text-green-500');
    
    if (!usedMagic) {
        gainStar();
    }

    // 延遲一下跳下一題
    setTimeout(() => {
        currentIndex++;
        loadWord();
    }, 1000);
}

function useMagic() {
    if (usedMagic) return; // 避免重複點擊
    usedMagic = true;
    const word = practiceQueue[currentIndex];
    
    document.getElementById('hintMessage').innerText = `答案是：${word.en} (請親自拼寫一次喔)`;
    document.getElementById('hintMessage').classList.remove('text-red-500');
    document.getElementById('hintMessage').classList.add('text-purple-600');
    
    // 禁用魔法按鈕
    const btn = document.getElementById('magicBtn');
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.disabled = true;

    document.getElementById('answerInput').focus();
}

function gainStar() {
    currentUser.stars++;
    sessionStars++;
    document.getElementById('practiceStars').innerText = currentUser.stars;
    
    // 飛行動畫特效
    const starFly = document.createElement('div');
    starFly.className = 'star-fly';
    starFly.innerText = '⭐';
    // 定位在畫面中間
    starFly.style.left = '50%';
    starFly.style.top = '50%';
    document.body.appendChild(starFly);
    setTimeout(() => starFly.remove(), 1000);

    saveData();

    // 檢查是否達到 20 顆星解鎖配件
    const expectedAccessories = Math.floor(currentUser.stars / 20);
    if (expectedAccessories > currentUser.unlockedAccessories.length && currentUser.unlockedAccessories.length < 20) {
        unlockNextAccessory();
    }
}

function unlockNextAccessory() {
    // 找出還沒解鎖的最小 ID
    let nextId = -1;
    for (let item of ACCESSORIES) {
        if (!currentUser.unlockedAccessories.includes(item.id)) {
            nextId = item.id;
            break;
        }
    }

    if (nextId !== -1) {
        currentUser.unlockedAccessories.push(nextId);
        saveData();
        
        // 暫停練習，顯示解鎖動畫
        const itemObj = ACCESSORIES.find(a => a.id === nextId);
        document.getElementById('unlockedItemName').innerText = `${itemObj.icon} ${itemObj.name}`;
        document.getElementById('unlockModal').classList.remove('hidden');
        
        // 更新娃娃外觀（同時更新主娃娃與迷你娃娃）
        updateDollAppearance();
        const miniContainer = document.getElementById('miniDollContainer');
        miniContainer.innerHTML = document.getElementById('svgDollContainer').innerHTML;
    }
}

function closeUnlockModal() {
    document.getElementById('unlockModal').classList.add('hidden');
    document.getElementById('answerInput').focus();
}

function exitPractice() {
    if(confirm('確定要退出練習嗎？目前的星星會保留喔！')) {
        returnToDashboard();
    }
}

function finishPractice() {
    document.getElementById('finishStars').innerText = sessionStars;
    showView('finish');
}

function returnToDashboard() {
    updateDashboard();
    showView('dashboard');
}

        <g id="acc-4" class="acc"><!-- 魔法棒 (拿在左手) --><line x1="135" y1="60" x2="90" y2="20" stroke="#fcd34d" stroke-width="4"/><polygon points="90,5 95,15 105,15 97,22 100,32 90,25 80,32 83,22 75,15 85,15" fill="#fbbf24"/></g>
        
        <g id="acc-14" class="acc"><!-- 捧花 (拿在右手) --><circle cx="265" cy="60" r="15" fill="#22c55e"/><circle cx="260" cy="50" r="8" fill="#f43f5e"/><circle cx="275" cy="55" r="8" fill="#d946ef"/><circle cx="265" cy="70" r="8" fill="#eab308"/></g>
        
        <g id="acc-13" class="acc"><!-- 星塵 --><text x="120" y="160" font-size="20">✨</text><text x="260" y="250" font-size="20">✨</text><text x="100" y="280" font-size="20">✨</text></g>
        <g id="acc-20" class="acc"><!-- 獎盃 --><path d="M 280 430 L 320 430 L 310 460 L 290 460 Z" fill="#f59e0b"/><rect x="290" y="460" width="20" height="5" fill="#b45309"/><path d="M 270 430 L 280 430 L 280 445 L 270 445 Z" fill="#fbbf24"/><path d="M 320 430 L 330 430 L 330 445 L 320 445 Z" fill="#fbbf24"/></g>
    </svg>
    `;
    document.getElementById('svgDollContainer').innerHTML = svgHTML;
}

function updateDollAppearance() {
    // 隱藏所有配件
    document.querySelectorAll('.acc').forEach(el => el.classList.remove('active'));
    
    // 顯示已解鎖的配件
    if (currentUser && currentUser.unlockedAccessories) {
        currentUser.unlockedAccessories.forEach(id => {
            const accObj = ACCESSORIES.find(a => a.id === id);
            if (accObj) {
                // 處理主畫面娃娃與迷你娃娃的同步
                const els = document.querySelectorAll(`#${accObj.svgId}`);
                els.forEach(el => el.classList.add('active'));
            }
        });
    }
}

// --- 收藏櫃 UI ---
function showCollectionRoom() {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = '';
    
    ACCESSORIES.forEach(item => {
        const isUnlocked = currentUser.unlockedAccessories.includes(item.id);
        
        const card = document.createElement('div');
        card.className = `p-4 rounded-2xl flex flex-col items-center justify-center text-center transition-transform transform hover:scale-105 border-4 ${isUnlocked ? 'bg-white border-pink-300 shadow-lg' : 'bg-gray-100 border-gray-200 opacity-70'}`;
        
        const iconDiv = document.createElement('div');
        iconDiv.className = 'text-5xl mb-2';
        iconDiv.innerText = isUnlocked ? item.icon : '❓';
        
        const nameDiv = document.createElement('div');
        nameDiv.className = `font-bold text-sm ${isUnlocked ? 'text-pink-600' : 'text-gray-400'}`;
        nameDiv.innerText = isUnlocked ? item.name : `${item.id * 20} 顆星解鎖`;
        
        card.appendChild(iconDiv);
        card.appendChild(nameDiv);
        grid.appendChild(card);
    });
    
    document.getElementById('collectionModal').classList.remove('hidden');
    document.getElementById('collectionModal').classList.add('flex');
}

function closeCollectionRoom() {
    document.getElementById('collectionModal').classList.add('hidden');
    document.getElementById('collectionModal').classList.remove('flex');
}

// 初始化語音以避免第一次播放延遲 (Chrome policy)
document.addEventListener('click', function initSpeech() {
    if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0;
        speechSynthesis.speak(u);
    }
    document.removeEventListener('click', initSpeech);
}, { once: true });

</script>
